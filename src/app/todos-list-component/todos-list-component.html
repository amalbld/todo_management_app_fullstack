<div class="container">
  <h1>My Todo's</h1>
  <h4 *ngIf="message" class="alert alert-success">{{ message }}</h4>
  <div class="container">
    <table class="table">
      <thead>
        <tr>
          <th>Description</th>
          <th>Date</th>
          <th>Is Completed?</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let todo of todos">
          <td>{{ todo.description }}</td>
          <td>{{ todo.targetDate | date : 'medium' }}</td>
          <td>{{ todo.done }}</td>
          <td>
            <button (click)="updateTodo(todo.username, todo.id)" class="btn btn-success">
              Update
            </button>
          </td>
          <td>
            <button (click)="deleteTodo(todo.username, todo.id)" class="btn btn-danger">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="mt-5">
    <button class="btn btn-info" (click)="addTodo()">Add Todo</button>
  </div>
</div>
