<div class="container">
  <h1>My Todo's</h1>
  <div class="container">
    <table class="table">
      <thead>
        <tr>
          <th>Description</th>
          <th>Date</th>
          <th>Is Completed?</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let todo of todos">
          <td>{{ todo.description }}</td>
          <td>{{ todo.date | date : 'medium' }}</td>
          <td>{{ todo.done }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
